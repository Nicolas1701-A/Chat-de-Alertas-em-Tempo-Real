<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Real-Time Monitor</title>
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css
" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.cs
s"/>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-
js@2"></script>

</head>
<body class="bg-dark text-light">
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card bg-secondary text-white shadow mb-4">
<div class="card-body">

<h5 class="card-title">🚨 Emitir Alerta</h5>
<div class="input-group">
<input type="text" id="campoMensagem"
class="form-control" placeholder="O que está a acontecer?">
<select id="campoNivel" class="form-select"
style="max-width: 120px;">
<option value="info">Info</option>
<option value="aviso">Aviso</option>
<option value="critico">Crítico</option>
</select>

<button class="btn btn-primary"

onclick="enviarParaBanco()">Enviar</button>
</div>
</div>
</div>
<div class="d-flex justify-content-between align-items-center
mb-3">
<h4>Feed de Alertas</h4>

<span class="badge bg-success" id="status-
conexao">Conectado</span>

</div>
<div id="listaDeAlertas" class="list-group">
</div>
</div>
</div>
</div>
<script src="app.js"></script>
</body>
</html>
